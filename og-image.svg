<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Prayas Jain — Lead AI Engineer">
  <title>Prayas Jain — Lead AI Engineer</title>
  <desc>Social share image for Prayas Jain's portfolio</desc>

  <defs>
    <radialGradient id="warm1" cx="0.15" cy="0" r="0.7">
      <stop offset="0%" stop-color="#C8331E" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C8331E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="warm2" cx="0.95" cy="0.2" r="0.45">
      <stop offset="0%" stop-color="#B58841" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#B58841" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="warm3" cx="0.5" cy="1.1" r="0.6">
      <stop offset="0%" stop-color="#C8331E" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#C8331E" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.08  0 0 0 0 0.075  0 0 0 0 0.055  0 0 0 0.5 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- Paper background -->
  <rect width="1200" height="630" fill="#ECE6D6"/>
  <rect width="1200" height="630" fill="url(#warm1)"/>
  <rect width="1200" height="630" fill="url(#warm2)"/>
  <rect width="1200" height="630" fill="url(#warm3)"/>

  <!-- Grain overlay -->
  <rect width="1200" height="630" fill="#ECE6D6" filter="url(#grain)" opacity="0.32" style="mix-blend-mode:multiply"/>

  <!-- Index strip (top) -->
  <line x1="64" y1="64" x2="1136" y2="64" stroke="#C8BFA8" stroke-width="1"/>
  <text x="64" y="52" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="13" letter-spacing="3" fill="#7E7460">№ 001 · PORTFOLIO · 2026 EDITION</text>
  <text x="1136" y="52" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="13" letter-spacing="3" fill="#7E7460" text-anchor="end">INDORE · IN ↔ GLOBAL</text>

  <!-- Live dot -->
  <circle cx="1098" cy="46" r="5" fill="#C8331E">
    <animate attributeName="opacity" values="1;0.5;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <text x="1088" y="52" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="13" letter-spacing="3" fill="#7E7460" text-anchor="end">OPEN</text>

  <!-- Name (massive serif) -->
  <text x="64" y="280" font-family="'Instrument Serif', 'Times New Roman', serif" font-size="170" font-weight="400" fill="#15130E" letter-spacing="-6">Prayas</text>
  <text x="64" y="430" font-family="'Instrument Serif', 'Times New Roman', serif" font-style="italic" font-size="170" font-weight="400" fill="#C8331E" letter-spacing="-6">Jain<tspan fill="#15130E" font-style="normal">.</tspan></text>

  <!-- Tagline -->
  <text x="64" y="495" font-family="'Bricolage Grotesque', system-ui, sans-serif" font-size="28" font-weight="300" fill="#3A352B">Lead AI Engineer  <tspan fill="#C8331E">·</tspan>  Multi-Agent Systems  <tspan fill="#C8331E">·</tspan>  RAG  <tspan fill="#C8331E">·</tspan>  LangGraph  <tspan fill="#C8331E">·</tspan>  AI SaaS</text>

  <!-- Bottom row -->
  <line x1="64" y1="540" x2="1136" y2="540" stroke="#C8BFA8" stroke-width="1"/>
  <text x="64" y="582" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="14" letter-spacing="3" fill="#7E7460">PRAYAS17.GITHUB.IO/PORTFOLIO</text>
  <text x="1136" y="582" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="14" letter-spacing="3" fill="#7E7460" text-anchor="end">PRAYAS1711@GMAIL.COM</text>

</svg>
